<!DOCTYPE html>
<html>
<head>
  <title>Trigun E-Store</title>
  <link rel="icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      background: linear-gradient(-45deg, #000000, #1a1a1a, #0f2027, #2c5364);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 28px;
      color: #ffd700;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .glow {
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
    }

    .box {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="box">
      <h1>Trigune E-Store</h1>
      <h2 class="glow">🚀 Launching Soon</h2>
      <p>Premium Mobile Accessories</p>
      <p>We are building something amazing for you</p>
      <p>Stay tuned 🔥</p>
    </div>
  </div>

</body>
</html>
