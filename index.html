<!DOCTYPE html>
<html>
<head>
  <title>Trigune E-Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: black;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 28px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      padding: 15px;
      width: 250px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: yellow;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>Trigune E-Store</header>

<div class="hero">
  <h1>Premium Mobile Accessories</h1>
  <p>Best Quality at Affordable Price</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h3>Mobile Case</h3>
    <p>Strong & Stylish</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h3>Charging Cable</h3>
    <p>Fast Charging</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h3>Screen Guard</h3>
    <p>Full Protection</p>
    <button class="btn">Buy Now</button>
  </div>

</div>

<footer>
  support@trigunestore.com
</footer>

</body>
</html>
